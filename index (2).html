<!DOCTYPE html>
<html lang="th">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Pettosan — Project Tracker</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link href="https://fonts.googleapis.com/css2?family=Sarabun:wght@400;500;600&display=swap" rel="stylesheet" />
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    body { font-family: 'Sarabun', sans-serif; background: #F5F5F3; color: #1a1a1a; min-height: 100vh; }
    .container { max-width: 720px; margin: 0 auto; padding: 2rem 1.25rem; }
    .header { display: flex; align-items: center; justify-content: space-between; margin-bottom: 1.5rem; }
    .header-left { display: flex; align-items: center; gap: 14px; }
    .logo { width: 44px; height: 44px; border-radius: 50%; background: #DBEAFE; display: flex; align-items: center; justify-content: center; font-weight: 600; font-size: 14px; color: #1D4ED8; flex-shrink: 0; }
    .header h1 { font-size: 20px; font-weight: 600; color: #111; }
    .header p { font-size: 13px; color: #888; margin-top: 2px; }
    .refresh-btn { font-family: 'Sarabun', sans-serif; font-size: 13px; padding: 7px 14px; border-radius: 10px; border: 1px solid #ddd; background: #fff; color: #555; cursor: pointer; display: flex; align-items: center; gap: 6px; }
    .refresh-btn:hover { background: #F3F4F6; }
    .summary-grid { display: grid; grid-template-columns: repeat(4, 1fr); gap: 10px; margin-bottom: 1.5rem; }
    .stat { background: #fff; border: 1px solid #E5E7EB; border-radius: 12px; padding: 0.75rem 1rem; }
    .stat-label { font-size: 12px; color: #888; margin-bottom: 4px; }
    .stat-value { font-size: 24px; font-weight: 600; color: #111; }
    .section-label { font-size: 12px; font-weight: 500; color: #888; letter-spacing: 0.05em; text-transform: uppercase; margin-bottom: 10px; }
    .card { background: #fff; border: 1px solid #E5E7EB; border-radius: 14px; padding: 1.1rem 1.25rem; margin-bottom: 10px; }

    .card-top { display: flex; align-items: flex-start; justify-content: space-between; margin-bottom: 12px; }
    .project-name { font-size: 15px; font-weight: 600; color: #111; }
    .project-desc { font-size: 13px; color: #888; margin-top: 3px; }
    .badge { font-size: 11px; font-weight: 500; padding: 3px 10px; border-radius: 20px; white-space: nowrap; flex-shrink: 0; margin-left: 8px; margin-top: 2px; }
    .badge-progress { background: #DBEAFE; color: #1D4ED8; }
    .badge-review   { background: #FEF3C7; color: #92400E; }
    .badge-done     { background: #D1FAE5; color: #065F46; }
    .badge-wait     { background: #F3F4F6; color: #6B7280; }
    .progress-wrap { display: flex; align-items: center; gap: 10px; margin-bottom: 12px; }
    .bar-bg { flex: 1; height: 6px; background: #F3F4F6; border-radius: 3px; overflow: hidden; }
    .bar { height: 100%; border-radius: 3px; transition: width 0.5s ease; }
    .pct { font-size: 12px; color: #888; min-width: 28px; text-align: right; }
    .milestones { display: flex; flex-wrap: wrap; gap: 6px 16px; margin-bottom: 12px; }
    .ms { display: flex; align-items: center; gap: 5px; font-size: 13px; color: #888; }
    .ms.done   { color: #059669; }
    .ms.active { color: #2563EB; font-weight: 500; }
    .ms svg { width: 14px; height: 14px; flex-shrink: 0; }
    .payment-row { display: flex; flex-wrap: wrap; gap: 6px; padding-top: 10px; border-top: 1px solid #F3F4F6; }
    .pill { display: flex; align-items: center; gap: 5px; font-size: 12px; padding: 4px 10px; border-radius: 20px; }
    .pill-paid    { background: #D1FAE5; color: #065F46; }
    .pill-unpaid  { background: #F3F4F6; color: #6B7280; border: 1px solid #E5E7EB; }
    .pill-pending { background: #FEE2E2; color: #B91C1C; border: 1px solid #FECACA; }
    .updated { font-size: 11px; color: #bbb; margin-top: 8px; }
    .state-msg { text-align: center; padding: 3rem 1rem; color: #aaa; font-size: 14px; }
    .state-msg svg { width: 36px; height: 36px; display: block; margin: 0 auto 12px; opacity: 0.4; }
    @keyframes spin { from { transform: rotate(0deg); } to { transform: rotate(360deg); } }
    @media (max-width: 480px) { .summary-grid { grid-template-columns: repeat(2, 1fr); } }
  </style>
</head>
<body>
<div class="container">
  <div class="header">
    <div class="header-left">
      <div class="logo">PT</div>
      <div>
        <h1>Pettosan — Project tracker</h1>
        <p id="last-updated">กำลังโหลด...</p>
      </div>
    </div>
    <button class="refresh-btn" onclick="loadSheet()">
      <svg width="14" height="14" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24"><path stroke-linecap="round" d="M16.023 9.348h4.992v-.001M2.985 19.644v-4.992m0 0h4.992m-4.993 0l3.181 3.183a8.25 8.25 0 0013.803-3.7M4.031 9.865a8.25 8.25 0 0113.803-3.7l3.181 3.182m0-4.991v4.99"/></svg>
      รีเฟรช
    </button>
  </div>

  <div id="summary" style="display:none">
    <div class="summary-grid">
      <div class="stat"><div class="stat-label">งานทั้งหมด</div><div class="stat-value" id="s-total">0</div></div>
      <div class="stat"><div class="stat-label">กำลังดำเนินการ</div><div class="stat-value" style="color:#2563EB" id="s-prog">0</div></div>
      <div class="stat"><div class="stat-label">รอ review</div><div class="stat-value" style="color:#D97706" id="s-rev">0</div></div>
      <div class="stat"><div class="stat-label">เสร็จแล้ว</div><div class="stat-value" style="color:#059669" id="s-done">0</div></div>
    </div>
    <div class="section-label">รายการงาน</div>
  </div>

  <div id="projects-container">
    <div class="state-msg">
      <svg style="animation:spin 1s linear infinite" fill="none" stroke="currentColor" stroke-width="1.5" viewBox="0 0 24 24"><path stroke-linecap="round" d="M16.023 9.348h4.992v-.001M2.985 19.644v-4.992m0 0h4.992m-4.993 0l3.181 3.183a8.25 8.25 0 0013.803-3.7M4.031 9.865a8.25 8.25 0 0113.803-3.7l3.181 3.182m0-4.991v4.99"/></svg>
      กำลังโหลดข้อมูล...
    </div>
  </div>
</div>

<script>
  const SHEET_URL = 'https://docs.google.com/spreadsheets/d/e/2PACX-1vQ-4ncJHfOfDWhgBrNva36Ucg96ohSq6RjB12Q2HDfUOxmdIJqSoMLPJgr_VOMiVcvY1twmPo7FzHWh/pub?gid=1285133519&single=true&output=csv';

  const STATUS = {
    progress: { label: 'กำลังทำ',     cls: 'badge-progress', color: '#3B82F6' },
    review:   { label: 'รอ review',    cls: 'badge-review',   color: '#F59E0B' },
    done:     { label: 'เสร็จแล้ว',   cls: 'badge-done',     color: '#10B981' },
    wait:     { label: 'รอดำเนินการ', cls: 'badge-wait',     color: '#9CA3AF' },
  };

  function iconCheck()  { return `<svg fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" d="M9 12.75L11.25 15 15 9.75M21 12a9 9 0 11-18 0 9 9 0 0118 0z"/></svg>`; }
  function iconCircle() { return `<svg fill="none" stroke="currentColor" stroke-width="1.5" viewBox="0 0 24 24"><circle cx="12" cy="12" r="9"/></svg>`; }
  function iconLoader() { return `<svg fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24"><path stroke-linecap="round" d="M16.023 9.348h4.992v-.001M2.985 19.644v-4.992m0 0h4.992m-4.993 0l3.181 3.183a8.25 8.25 0 0013.803-3.7M4.031 9.865a8.25 8.25 0 0113.803-3.7l3.181 3.182m0-4.991v4.99"/></svg>`; }

  function parseCSV(text) {
    const lines = text.trim().split('\n');
    if (lines.length < 2) return [];
    const headers = lines[0].split(',').map(h => h.trim().replace(/^"|"$/g, '').toLowerCase());
    return lines.slice(1).map(line => {
      const vals = []; let cur = '', inQ = false;
      for (let i = 0; i < line.length; i++) {
        if (line[i] === '"') { inQ = !inQ; }
        else if (line[i] === ',' && !inQ) { vals.push(cur.trim()); cur = ''; }
        else { cur += line[i]; }
      }
      vals.push(cur.trim());
      const obj = {};
      headers.forEach((h, i) => obj[h] = (vals[i] || '').replace(/^"|"$/g, '').trim());
      return obj;
    }).filter(r => r['project_name'] && r['project_name'].length > 0);
  }

  function buildCard(row) {
    const sKey = (row['status'] || '').toLowerCase();
    const s = STATUS[sKey] || { label: row['status'] || '-', cls: 'badge-wait', color: '#9CA3AF' };
    const progress = Math.min(100, Math.max(0, parseInt(row['progress']) || 0));
    const milestones = [];
    for (let i = 1; i <= 6; i++) {
      const name = row[`milestone_${i}`] || row[`m${i}`];
      if (!name) continue;
      const doneVal = (row[`m${i}_done`] || row[`milestone_${i}_done`] || '').toLowerCase();
      const isDone = doneVal === 'true' || doneVal === '1' || doneVal === 'yes';
      const isActive = !isDone && milestones.every(m => m.done);
      milestones.push({ name, done: isDone, active: isActive });
    }
    const payments = [];
    for (let i = 1; i <= 4; i++) {
      const val = (row[`payment_${i}`] || '').toLowerCase();
      if (!val) continue;
      const paid = val === 'paid' || val === 'true' || val === '1' || val === 'จ่ายแล้ว';
      const pending = val === 'pending' || val === 'รอชำระ';
      payments.push({ label: `งวด ${i}`, paid, pending });
    }
    const msHtml = milestones.map(m => `<div class="ms ${m.done ? 'done' : m.active ? 'active' : ''}">${m.done ? iconCheck() : m.active ? iconLoader() : iconCircle()} ${m.name}</div>`).join('');
    const pyHtml = payments.map(p => `<div class="pill ${p.paid ? 'pill-paid' : p.pending ? 'pill-pending' : 'pill-unpaid'}">${p.paid ? iconCheck() : p.pending ? `<svg style="color:#F87171" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24"><circle cx="12" cy="12" r="9" stroke="#F87171"/><path stroke="#F87171" stroke-linecap="round" d="M12 8v4m0 4h.01"/></svg>` : iconCircle()} ${p.label}${p.paid ? ' — จ่ายแล้ว' : p.pending ? ' — รอชำระเงิน' : ''}</div>`).join('');
    return `
      <div class="card">
        <div class="card-top">
          <div>
            <div class="project-name">${row['project_name']}</div>
            ${row['description'] ? `<div class="project-desc">${row['description']}</div>` : ''}

          </div>
          <div class="badge ${s.cls}">${s.label}</div>
        </div>
        <div class="progress-wrap">
          <div class="bar-bg"><div class="bar" style="width:${progress}%;background:${s.color}"></div></div>
          <div class="pct">${progress}%</div>
        </div>
        ${milestones.length ? `<div class="milestones">${msHtml}</div>` : ''}
        ${payments.length ? `<div class="payment-row">${pyHtml}</div>` : ''}
        ${row['updated'] ? `<div class="updated">อัปเดต: ${row['updated']}</div>` : ''}
      </div>`;
  }

  async function loadSheet() {
    const container = document.getElementById('projects-container');
    container.innerHTML = '<div class="state-msg"><svg style="animation:spin 1s linear infinite" fill="none" stroke="currentColor" stroke-width="1.5" viewBox="0 0 24 24"><path stroke-linecap="round" d="M16.023 9.348h4.992v-.001M2.985 19.644v-4.992m0 0h4.992m-4.993 0l3.181 3.183a8.25 8.25 0 0013.803-3.7M4.031 9.865a8.25 8.25 0 0113.803-3.7l3.181 3.182m0-4.991v4.99"/></svg>กำลังโหลดข้อมูล...</div>';
    document.getElementById('summary').style.display = 'none';
    try {
      const resp = await fetch(SHEET_URL);
      if (!resp.ok) throw new Error('fetch failed');
      const text = await resp.text();
      const rows = parseCSV(text);
      if (!rows.length) throw new Error('no data');
      document.getElementById('s-total').textContent = rows.length;
      document.getElementById('s-done').textContent  = rows.filter(r => (r['status']||'').toLowerCase() === 'done').length;
      document.getElementById('s-prog').textContent  = rows.filter(r => (r['status']||'').toLowerCase() === 'progress').length;
      document.getElementById('s-rev').textContent   = rows.filter(r => (r['status']||'').toLowerCase() === 'review').length;
      document.getElementById('summary').style.display = 'block';
      document.getElementById('last-updated').textContent = 'อัปเดตเมื่อ ' + new Date().toLocaleString('th-TH', { dateStyle: 'medium', timeStyle: 'short' });
      container.innerHTML = rows.map(buildCard).join('');
    } catch(e) {
      container.innerHTML = '<div class="state-msg"><svg fill="none" stroke="currentColor" stroke-width="1.5" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" d="M12 9v3.75m9-.75a9 9 0 11-18 0 9 9 0 0118 0zm-9 3.75h.008v.008H12v-.008z"/></svg>โหลดข้อมูลไม่ได้ กรุณาลองใหม่อีกครั้ง</div>';
    }
  }

  loadSheet();
</script>
</body>
</html>
